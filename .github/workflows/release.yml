# Release build & Docker image — runs on main only
# Validates the release binary builds and optionally pushes a Docker image.

name: Release

on:
  push:
    branches: [main]
    # Only run when source code changes (not docs/CI changes)
    paths:
      - 'crates/**'
      - 'migrations/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Release binary build ────────────────────────────────────
  build:
    name: Release Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Build release binary
        run: cargo build --release --bin social-api
      - name: Print binary size
        run: ls -lh target/release/social-api
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: social-api
          path: target/release/social-api
          retention-days: 7

  # ── Docker image build (no push — add registry push when ready) ──
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: social-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
