services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: social
      POSTGRES_PASSWORD: social_password
      POSTGRES_DB: social_api
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U social -d social_api"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mock-services:
    build:
      context: .
      dockerfile: Dockerfile.mock
    environment:
      MOCK_PORT: "8081"
      RUST_LOG: info
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # In production, each content API would be a separate service.
  # For dev, all mock APIs share mock-services on port 8081.

  social-api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://social:social_password@postgres:5432/social_api
      READ_DATABASE_URL: postgres://social:social_password@postgres:5432/social_api
      REDIS_URL: redis://redis:6379
      HTTP_PORT: "8080"
      CONTENT_API_POST_URL: http://mock-services:8081
      CONTENT_API_BONUS_HUNTER_URL: http://mock-services:8081
      CONTENT_API_TOP_PICKS_URL: http://mock-services:8081
      PROFILE_API_URL: http://mock-services:8081
      RUST_LOG: social_api=debug,tower_http=debug
      LOG_LEVEL: debug
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-services:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3

volumes:
  pgdata:
