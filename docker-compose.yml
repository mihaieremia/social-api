services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: social
      POSTGRES_PASSWORD: social_password
      POSTGRES_DB: social_api
    ports:
      - "5432:5432"
    volumes:
      # For faster tests, replace pgdata with tmpfs:
      # tmpfs:
      #   - /var/lib/postgresql/data
      - pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=500"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "random_page_cost=1.1"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U social -d social_api"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-backlog 511
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  mock-services:
    build:
      context: .
      dockerfile: Dockerfile
      target: mock-services
    restart: unless-stopped
    environment:
      MOCK_PORT: "8081"
      MOCK_GRPC_PORT: "50052"
      RUST_LOG: info
    ports:
      - "8081:8081"
      - "50052:50052"
    # Note: distroless image has no shell/curl, so no container-level healthcheck.
    # The app's /health endpoint can be checked externally or via Docker engine API.
    deploy:
      resources:
        limits:
          memory: 256M

  # In production, each content API would be a separate service.
  # For dev, all mock APIs share mock-services on port 8081.

  social-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: social-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://social:social_password@postgres:5432/social_api
      READ_DATABASE_URL: postgres://social:social_password@postgres:5432/social_api
      REDIS_URL: redis://redis:6379
      HTTP_PORT: "8080"
      CONTENT_API_POST_URL: http://mock-services:8081
      CONTENT_API_BONUS_HUNTER_URL: http://mock-services:8081
      CONTENT_API_TOP_PICKS_URL: http://mock-services:8081
      PROFILE_API_URL: http://mock-services:8081
      GRPC_PORT: "50051"
      INTERNAL_TRANSPORT: "grpc"
      INTERNAL_GRPC_URL: "http://mock-services:50052"
      DB_MAX_CONNECTIONS: "${DB_MAX_CONNECTIONS:-20}"
      DB_MIN_CONNECTIONS: "${DB_MIN_CONNECTIONS:-5}"
      DB_ACQUIRE_TIMEOUT_SECS: "${DB_ACQUIRE_TIMEOUT_SECS:-5}"
      REDIS_POOL_SIZE: "${REDIS_POOL_SIZE:-15}"
      CACHE_TTL_LIKE_COUNTS_SECS: "${CACHE_TTL_LIKE_COUNTS_SECS:-300}"
      CACHE_TTL_CONTENT_VALIDATION_SECS: "${CACHE_TTL_CONTENT_VALIDATION_SECS:-3600}"
      CACHE_TTL_USER_STATUS_SECS: "${CACHE_TTL_USER_STATUS_SECS:-60}"
      CACHE_TTL_LIKE_STATUS_SECS: "${CACHE_TTL_LIKE_STATUS_SECS:-300}"
      CACHE_TTL_USER_LIKES_SECS: "${CACHE_TTL_USER_LIKES_SECS:-60}"
      CACHE_TTL_LEADERBOARD_FILTERED_SECS: "${CACHE_TTL_LEADERBOARD_FILTERED_SECS:-60}"
      LOCAL_CACHE_TTL_MS: "${LOCAL_CACHE_TTL_MS:-200}"
      LOCAL_CACHE_MAX_CAPACITY: "${LOCAL_CACHE_MAX_CAPACITY:-10000}"
      SERVER_CONCURRENCY_LIMIT: "${SERVER_CONCURRENCY_LIMIT:-200}"
      RATE_LIMIT_READ_PER_MINUTE: "${RATE_LIMIT_READ_PER_MINUTE:-1000}"
      RATE_LIMIT_WRITE_PER_MINUTE: "${RATE_LIMIT_WRITE_PER_MINUTE:-30}"
      CIRCUIT_BREAKER_FAILURE_THRESHOLD: "${CIRCUIT_BREAKER_FAILURE_THRESHOLD:-5}"
      CIRCUIT_BREAKER_RECOVERY_TIMEOUT_SECS: "${CIRCUIT_BREAKER_RECOVERY_TIMEOUT_SECS:-30}"
      CIRCUIT_BREAKER_SUCCESS_THRESHOLD: "${CIRCUIT_BREAKER_SUCCESS_THRESHOLD:-3}"
      RUST_LOG: social_api=info,tower_http=warn
      LOG_LEVEL: info
      ACCESS_LOG: errors
    ports:
      - "8080:8080"
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-services:
        condition: service_started
    # Note: distroless image has no shell/curl, so no container-level healthcheck.
    # The app's /health/live endpoint can be checked externally or via Docker engine API.
    deploy:
      resources:
        limits:
          memory: 512M

  # --- Observability Stack ---

  prometheus:
    image: prom/prometheus:v3
    restart: unless-stopped
    profiles: [monitoring]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    # No depends_on: Prometheus tolerates targets being down and retries on next scrape.
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:11.5.2
    restart: unless-stopped
    profiles: [monitoring]
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/social-api-overview.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    profiles: [monitoring]
    environment:
      DATA_SOURCE_NAME: "postgresql://social:social_password@postgres:5432/social_api?sslmode=disable"
    # No host port exposure needed — Prometheus reaches it via Docker DNS at postgres-exporter:9187
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9187/metrics"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    profiles: [monitoring]
    environment:
      REDIS_ADDR: "redis://redis:6379"
    # No host port exposure needed — Prometheus reaches it via Docker DNS at redis-exporter:9121
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  pgdata:
  prometheus_data:
  grafana_data:
