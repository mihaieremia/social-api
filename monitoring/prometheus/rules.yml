groups:
  - name: social_api_latency
    interval: 5s
    rules:
      # Global HTTP latency quantiles
      - record: social_api:http_request_duration:p50
        expr: histogram_quantile(0.5, sum(rate(social_api_http_request_duration_seconds_bucket[5m])) by (le))
      - record: social_api:http_request_duration:p90
        expr: histogram_quantile(0.9, sum(rate(social_api_http_request_duration_seconds_bucket[5m])) by (le))
      - record: social_api:http_request_duration:p99
        expr: histogram_quantile(0.99, sum(rate(social_api_http_request_duration_seconds_bucket[5m])) by (le))

      # Per-endpoint HTTP latency quantiles
      - record: social_api:http_request_duration_by_path:p50
        expr: histogram_quantile(0.5, sum by (le, path) (rate(social_api_http_request_duration_seconds_bucket[5m])))
      - record: social_api:http_request_duration_by_path:p90
        expr: histogram_quantile(0.9, sum by (le, path) (rate(social_api_http_request_duration_seconds_bucket[5m])))
      - record: social_api:http_request_duration_by_path:p99
        expr: histogram_quantile(0.99, sum by (le, path) (rate(social_api_http_request_duration_seconds_bucket[5m])))

      # External call latency quantiles
      - record: social_api:external_call_duration:p50
        expr: histogram_quantile(0.5, sum by (le, service) (rate(social_api_external_call_duration_seconds_bucket[5m])))
      - record: social_api:external_call_duration:p90
        expr: histogram_quantile(0.9, sum by (le, service) (rate(social_api_external_call_duration_seconds_bucket[5m])))
      - record: social_api:external_call_duration:p99
        expr: histogram_quantile(0.99, sum by (le, service) (rate(social_api_external_call_duration_seconds_bucket[5m])))
