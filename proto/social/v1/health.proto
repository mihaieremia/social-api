syntax = "proto3";

package social.v1;

// Health checking service following the gRPC health checking protocol pattern.
service Health {
  // Check the health of the service and its dependencies.
  rpc Check(HealthCheckRequest) returns (HealthCheckResponse);
}

message HealthCheckRequest {
  // Optional service name to check. Empty string checks the overall service.
  string service = 1;
}

message HealthCheckResponse {
  // Overall serving status.
  ServingStatus status = 1;
  // Per-dependency details (e.g. "database" -> "up", "redis" -> "down").
  map<string, string> details = 2;
}

// Service health status.
enum ServingStatus {
  SERVING_STATUS_UNKNOWN = 0;
  SERVING_STATUS_SERVING = 1;
  SERVING_STATUS_NOT_SERVING = 2;
}
